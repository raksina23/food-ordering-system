name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:

  # ── 1. Lint ───────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend deps
        run: npm install
        working-directory: src/backend

      - name: Install frontend deps
        run: npm install
        working-directory: src/frontend

  # ── 2. Test ───────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: campuseats_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend deps
        run: npm install
        working-directory: src/backend

      - name: Run tests
        run: npm test --if-present
        working-directory: src/backend
        env:
          NODE_ENV: test
          PORT: 5000
          DB_HOST: localhost
          DB_PORT: 5432
          DB_NAME: campuseats_test
          DB_USER: postgres
          DB_PASSWORD: testpassword
          JWT_SECRET: test_secret

  # ── 3. Build Docker Image ─────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t campuseats:${{ github.sha }} .

      - name: Test health endpoint
        run: |
          docker run -d -p 5000:5000 \
            -e NODE_ENV=production \
            -e JWT_SECRET=test_secret \
            -e DB_HOST=localhost \
            -e DB_PASSWORD=test \
            --name campuseats-test \
            campuseats:${{ github.sha }}
          sleep 5
          curl -f http://localhost:5000/api/health || exit 1
          docker stop campuseats-test